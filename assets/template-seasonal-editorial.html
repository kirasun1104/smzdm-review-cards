<!doctype html>
<html lang="zh-CN" data-style="seasonal-editorial" data-palette="coral-cream">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seasonal Editorial Review Cards</title>
    <style>
      /*
        Seasonal Editorial seed
        Inspired by Spring/Summer's public site language:
        alternating warm neutral / vivid coral fields, giant condensed headlines,
        translucent bordered utility modules, stacked real-photo evidence, and
        a strict editorial grid. Do not copy Spring/Summer brand marks or text.
      */
      * {
        box-sizing: border-box;
      }

      :root {
        --coral: #ff3638;
        --cream: #dedcd2;
        --ink: #191513;
        --white: #f8f3e8;
        --tone-coral-text: var(--cream);
        --tone-cream-text: var(--coral);
        --hairline: rgba(255, 255, 255, .28);
        --hairline-dark: rgba(25, 21, 19, .22);
        --grid: 32px;
        --br: 8px;
        --sans: "Arial Narrow", "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", sans-serif;
        --mono: "SFMono-Regular", "Roboto Mono", "IBM Plex Mono", Consolas, monospace;
      }

      html[data-palette="approach-red"] {
        --coral: #fe3939;
        --cream: #0a0605;
        --ink: #0a0605;
        --white: #f8f5e7;
        --tone-coral-text: var(--ink);
        --tone-cream-text: var(--white);
      }

      body {
        margin: 0;
        background: #111;
        font-family: var(--sans);
      }

      .deck {
        display: grid;
        gap: 24px;
        padding: 24px;
      }

      .poster {
        position: relative;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        padding: 44px 44px 48px;
        color: var(--tone-cream-text);
        background: var(--cream);
        display: grid;
        grid-template-rows: 42px 1fr 42px;
        gap: 28px;
      }

      .poster.tone-coral {
        color: var(--tone-coral-text);
        background: var(--coral);
      }

      .poster.tone-cream {
        color: var(--tone-cream-text);
        background: var(--cream);
      }

      .content {
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 34px;
        position: relative;
      }

      .topbar,
      .foot {
        border: 1px solid currentColor;
        border-radius: var(--br);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        font: 22px/1 var(--mono);
        letter-spacing: 0;
        opacity: .72;
      }

      .topbar span,
      .foot span {
        white-space: nowrap;
      }

      .kicker,
      .label,
      .mono,
      .image-caption {
        font-family: var(--mono);
        letter-spacing: 0;
      }

      .kicker {
        font-size: 24px;
        line-height: 1.1;
        opacity: .72;
      }

      .h-xl,
      .h-md {
        margin: 0;
        font-family: Impact, "Arial Black", "Helvetica Neue Condensed Black", var(--sans);
        font-stretch: condensed;
        font-weight: 1000;
        letter-spacing: .05em;
        text-transform: uppercase;
        text-shadow: .025em 0 0 currentColor;
      }

      .h-xl {
        font-size: 186px;
        line-height: .88;
        max-width: 980px;
      }

      .h-xl span,
      .h-md span {
        display: block;
      }

      .h-md {
        font-size: 124px;
        line-height: .92;
      }

      .lead {
        max-width: 760px;
        margin: 0;
        font-size: 40px;
        line-height: 1.28;
        font-weight: 500;
      }

      .body,
      .note {
        margin: 0;
        font-size: 30px;
        line-height: 1.48;
        font-weight: 500;
      }

      .seasonal-frame,
      .compare-card,
      .split-row,
      .minimal-ledger,
      .price-formula,
      .risk-strip,
      .issue-strip,
      .bws-card,
      .decision-cell,
      .benefit-row {
        border: 1px solid currentColor;
        border-radius: var(--br);
        background: rgba(255, 255, 255, .06);
      }

      .tone-cream .seasonal-frame,
      .tone-cream .compare-card,
      .tone-cream .split-row,
      .tone-cream .minimal-ledger,
      .tone-cream .price-formula,
      .tone-cream .risk-strip,
      .tone-cream .issue-strip,
      .tone-cream .bws-card,
      .tone-cream .decision-cell,
      .tone-cream .benefit-row {
        background: rgba(255, 54, 56, .04);
      }

      .glass-panel {
        border: 1px solid currentColor;
        border-radius: var(--br);
        padding: 22px;
        background: rgba(255, 255, 255, .08);
      }

      .tone-cream .glass-panel {
        background: rgba(255, 54, 56, .04);
      }

      .image-well,
      .evidence-frame,
      .image-module {
        margin: 0;
        border-radius: var(--br);
        overflow: hidden;
        background: rgba(0, 0, 0, .12);
      }

      .image-well img,
      .evidence-frame img,
      .image-module img,
      .photo-card img,
      .sample-pair img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .photo-stack {
        position: relative;
        height: 820px;
        min-height: 820px;
      }

      .photo-card {
        position: absolute;
        overflow: hidden;
        border-radius: var(--br);
        background: rgba(0, 0, 0, .16);
        box-shadow: 0 20px 48px rgba(0, 0, 0, .18);
      }

      .photo-card.main {
        left: 0;
        top: 168px;
        width: 610px;
        height: 600px;
        transform: rotate(-2.6deg);
      }

      .photo-card.secondary {
        right: 22px;
        top: 432px;
        width: 440px;
        height: 430px;
        transform: rotate(1.4deg);
      }

      .tape {
        position: absolute;
        width: 210px;
        height: 38px;
        background: rgba(255, 255, 255, .28);
        transform: rotate(-5deg);
        z-index: 5;
      }

      .tape.one {
        left: 80px;
        top: 156px;
      }

      .tape.two {
        right: 250px;
        top: 416px;
        transform: rotate(7deg);
      }

      .hero-overlap {
        position: relative;
        min-height: 980px;
      }

      .hero-overlap .lead {
        position: absolute;
        left: 0;
        bottom: -248px;
        max-width: 700px;
        z-index: 8;
      }

      .hero-overlap .photo-stack {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -38px;
      }

      .evidence-layout {
        display: grid;
        grid-template-rows: auto 720px auto;
        gap: 28px;
        min-height: 1180px;
      }

      .evidence-layout .image-well {
        width: 100%;
        height: 720px;
      }

      .evidence-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-template-rows: auto 1fr auto;
        column-gap: 22px;
        row-gap: 28px;
        min-height: 1180px;
      }

      .evidence-grid .evidence-head {
        grid-column: 1 / -1;
      }

      .evidence-grid .image-well {
        grid-column: 1 / 9;
        height: 640px;
      }

      .evidence-grid .issue-strip {
        grid-column: 9 / -1;
        grid-template-columns: 1fr !important;
        align-self: start;
      }

      .evidence-grid .issue-strip > * {
        border-right: 0 !important;
        border-bottom: 1px solid currentColor !important;
      }

      .evidence-grid .issue-strip > :last-child {
        border-bottom: 0 !important;
      }

      .evidence-grid .wide-note {
        grid-column: 1 / -1;
        align-self: end;
      }

      .grid-2,
      .compare-grid,
      .bws-grid,
      .decision-matrix {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
      }

      .decision-matrix {
        gap: 28px;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .panel,
      .compare-card,
      .bws-card,
      .decision-cell,
      .benefit-row {
        padding: 22px;
      }

      .compare-card .value,
      .decision-cell .value,
      .bws-card .value {
        margin-top: 12px;
        font-size: 54px;
        line-height: .95;
        font-weight: 900;
      }

      .ledger,
      .minimal-ledger {
        display: grid;
      }

      .split-row,
      .minimal-row {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 24px;
        padding: 22px;
        border-bottom: 1px solid currentColor;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }

      .split-row:first-child,
      .minimal-row:first-child {
        border-top-left-radius: var(--br);
        border-top-right-radius: var(--br);
      }

      .split-row:last-child,
      .minimal-row:last-child {
        border-bottom: 0;
        border-bottom-left-radius: var(--br);
        border-bottom-right-radius: var(--br);
      }

      .label {
        font-size: 22px;
        line-height: 1.1;
        opacity: .72;
      }

      .image-caption {
        font-size: 22px;
        line-height: 1.25;
        opacity: .72;
      }

      .issue-strip,
      .risk-strip {
        display: grid;
        gap: 0;
        overflow: hidden;
      }

      .issue-strip span,
      .risk {
        display: block;
        padding: 28px;
        border-bottom: 1px solid currentColor;
        font-size: 26px;
        line-height: 1.36;
      }

      .issue-strip span:last-child,
      .risk:last-child {
        border-bottom: 0;
      }

      .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))),
      .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) {
        grid-template-columns: repeat(3, 1fr);
        border-radius: 0;
      }

      .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *,
      .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * {
        border-bottom: 0;
        border-right: 1px solid currentColor;
      }

      .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > :last-child,
      .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > :last-child {
        border-right: 0;
      }

      .price-formula {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto 1fr;
        align-items: stretch;
        gap: 14px;
        overflow: visible;
        border: 0;
        background: transparent;
      }

      .formula-step {
        border: 1px solid currentColor;
        border-radius: var(--br);
        padding: 24px;
      }

      .formula-step .num {
        margin-top: 18px;
        font-size: 60px;
        line-height: .92;
        font-weight: 900;
      }

      .formula-arrow {
        display: grid;
        place-items: center;
        width: 54px;
        border: 0;
        border-radius: 0;
        background: transparent;
        font-size: 34px;
      }

      .verdict-pill,
      .decision-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        max-width: 100%;
        min-height: 72px;
        border-radius: var(--br);
        padding: 14px 22px;
        background: currentColor;
      }

      .verdict-pill span,
      .decision-button span {
        color: var(--cream);
        font-size: 34px;
        line-height: 1;
        font-weight: 900;
      }

      .tone-coral .verdict-pill span,
      .tone-coral .decision-button span {
        color: var(--coral);
      }

      html[data-palette="approach-red"] .tone-coral .verdict-pill span,
      html[data-palette="approach-red"] .tone-coral .decision-button span {
        color: var(--white);
      }

      html[data-palette="approach-red"] .tone-cream .verdict-pill span,
      html[data-palette="approach-red"] .tone-cream .decision-button span {
        color: var(--ink);
      }

      .base-layer {
        align-self: end;
      }

      .page-plan {
        display: grid;
        gap: 22px;
        min-height: 1180px;
        align-content: space-between;
      }

      .final-layout {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 28px;
        min-height: 1180px;
      }

      .final-layout .risk-strip {
        grid-template-columns: 1fr !important;
        gap: 12px;
        border: 0;
        background: transparent;
        align-self: end;
        overflow: visible;
      }

      .final-layout .risk {
        border: 1px solid currentColor !important;
        border-radius: var(--br);
        background: rgba(255, 255, 255, .08);
        padding: 18px 22px;
      }

      .tone-cream .final-layout .risk {
        background: rgba(255, 54, 56, .04);
      }

      .seasonal-wordmark {
        font: 20px/1 var(--mono);
        opacity: .72;
      }
    </style>
  </head>
  <body>
    <main class="deck">
      <!-- POSTERS_HERE -->
      <section class="poster template-preview tone-cream" data-page-type="cover-verdict">
        <div class="topbar"><span>BEAUTY / FASHION BUYING NOTE</span><span>SMZDM REVIEW</span></div>
        <div class="content">
          <div class="hero-overlap">
            <h1 class="h-xl"><span>肤感</span><span>先行</span></h1>
            <div class="photo-stack" aria-hidden="true">
              <div class="tape one"></div>
              <div class="photo-card main"></div>
              <div class="tape two"></div>
              <div class="photo-card secondary"></div>
            </div>
            <p class="lead">用真实试色、上脸、材质或穿搭证据，给出买、等或跳过的明确判断。</p>
          </div>
        </div>
        <div class="foot"><span>SEASONAL REVIEW</span><span>01</span></div>
      </section>
    </main>
  </body>
</html>
