<!doctype html>
<html lang="zh-CN" data-style="digital-pop" data-palette="violet-lime">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMZDM Review Verdict Deck · Digital Pop</title>
  <style>
    :root {
      --paper:#6C3BFF;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.76);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.14);
      --accent:#9BFF57;
      --accent-on:#111111;
      --black:#1D1A1B;
      --white:#F7F5F1;
      --sans:Inter,"PingFang SC","Noto Sans SC",Arial,sans-serif;
      --mono:"IBM Plex Mono","SFMono-Regular",Menlo,monospace
    }
    
    html[data-palette="violet-lime"] {
      --paper:#6C3BFF;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.78);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.13);
      --accent:#9BFF57;
      --accent-on:#111111;
      --black:#1D1A1B;
      --white:#F7F5F1
    }
    
    html[data-palette="lime-blue"] {
      --paper:#DFFF3A;
      --ink:#111111;
      --muted:rgba(17,17,17,.70);
      --line:#111111;
      --soft:rgba(17,17,17,.08);
      --accent:#1598E8;
      --accent-on:#FFFFFF;
      --black:#171718;
      --white:#F7F5F1
    }
    
    html[data-palette="violet-pink"] {
      --paper:#6C4CFF;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.74);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.14);
      --accent:#F5B9E6;
      --accent-on:#111111;
      --black:#191719;
      --white:#F7F5F1
    }
    
    * {
      box-sizing:border-box
    }
     body {
      margin:0;
      background:#1f1d1e;
      font-family:var(--sans);
      color:var(--ink)
    }
     .sheet {
      display:grid;
      gap:32px;
      padding:32px;
      place-items:center
    }
    
    .poster {
      width:1080px;
      height:1440px;
      overflow:hidden;
      background:var(--paper);
      padding:104px;
      display:flex;
      flex-direction:column;
      border:0;
      border-radius:0;
      position:relative;
      box-shadow:none;
      color:var(--ink)
    }
    
    .poster::before {
      display:none
    }
    .poster.tone-violet {
      --paper:#6C3BFF;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.78);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.14);
      --accent:#9BFF57;
      --accent-on:#111111;
      --black:#1D1A1B;
      --white:#F7F5F1
    }
    .poster.tone-lime {
      --paper:#9BFF57;
      --ink:#111111;
      --muted:rgba(17,17,17,.72);
      --line:#111111;
      --soft:rgba(17,17,17,.10);
      --accent:#6C3BFF;
      --accent-on:#FFFFFF;
      --black:#1D1A1B;
      --white:#F7F5F1
    }
    .poster.tone-black {
      --paper:#1D1A1B;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.72);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.12);
      --accent:#9BFF57;
      --accent-on:#111111;
      --black:#6C3BFF;
      --white:#F7F5F1
    }
    .poster.tone-white {
      --paper:#F7F5F1;
      --ink:#111111;
      --muted:rgba(17,17,17,.70);
      --line:#111111;
      --soft:rgba(17,17,17,.08);
      --accent:#6C3BFF;
      --accent-on:#FFFFFF;
      --black:#1D1A1B;
      --white:#F7F5F1
    }

    html[data-palette="lime-blue"] .poster.tone-violet {
      --paper:#1598E8;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.76);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.15);
      --accent:#DFFF3A;
      --accent-on:#111111;
      --black:#171718;
      --white:#F7F5F1
    }
    html[data-palette="lime-blue"] .poster.tone-lime {
      --paper:#DFFF3A;
      --ink:#111111;
      --muted:rgba(17,17,17,.72);
      --line:#111111;
      --soft:rgba(17,17,17,.10);
      --accent:#1598E8;
      --accent-on:#FFFFFF;
      --black:#171718;
      --white:#F7F5F1
    }
    html[data-palette="lime-blue"] .poster.tone-black {
      --paper:#171718;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.72);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.12);
      --accent:#DFFF3A;
      --accent-on:#111111;
      --black:#1598E8;
      --white:#F7F5F1
    }
    html[data-palette="lime-blue"] .poster.tone-white {
      --paper:#F7F5F1;
      --ink:#111111;
      --muted:rgba(17,17,17,.70);
      --line:#111111;
      --soft:rgba(17,17,17,.08);
      --accent:#1598E8;
      --accent-on:#FFFFFF;
      --black:#171718;
      --white:#F7F5F1
    }
    html[data-palette="violet-pink"] .poster.tone-violet {
      --paper:#6C4CFF;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.76);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.15);
      --accent:#F5B9E6;
      --accent-on:#111111;
      --black:#191719;
      --white:#F7F5F1
    }
    html[data-palette="violet-pink"] .poster.tone-lime {
      --paper:#F5B9E6;
      --ink:#111111;
      --muted:rgba(17,17,17,.72);
      --line:#111111;
      --soft:rgba(17,17,17,.10);
      --accent:#6C4CFF;
      --accent-on:#FFFFFF;
      --black:#191719;
      --white:#F7F5F1
    }
    html[data-palette="violet-pink"] .poster.tone-black {
      --paper:#191719;
      --ink:#FFFFFF;
      --muted:rgba(255,255,255,.72);
      --line:#FFFFFF;
      --soft:rgba(255,255,255,.12);
      --accent:#F5B9E6;
      --accent-on:#111111;
      --black:#6C4CFF;
      --white:#F7F5F1
    }
    html[data-palette="violet-pink"] .poster.tone-white {
      --paper:#F7F5F1;
      --ink:#111111;
      --muted:rgba(17,17,17,.70);
      --line:#111111;
      --soft:rgba(17,17,17,.08);
      --accent:#6C4CFF;
      --accent-on:#FFFFFF;
      --black:#191719;
      --white:#F7F5F1
    }
    
    .content {
      position:relative;
      z-index:1;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:30px
    }
    .kicker {
      width:fit-content;
      max-width:100%;
      border-radius:999px;
      background:var(--soft);
      padding:8px 14px;
      font:500 22px/1 var(--mono);
      letter-spacing:.02em;
      color:var(--ink);
      text-transform:uppercase
    }
    .h-xl {
      font-size:118px;
      line-height:.96;
      font-weight:260;
      letter-spacing:0;
      margin:30px 0 8px
    }
    .h-md {
      font-size:64px;
      line-height:1.06;
      font-weight:300;
      letter-spacing:0;
      margin:0 0 26px
    }
    .h-xl span,
    .h-md span {
      display:block
    }
    .lead {
      font-size:34px;
      line-height:1.45
    }
    .body {
      font-size:28px;
      line-height:1.45
    }
    .grid-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px
    }
    .grid-3 {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px
    }
    .panel {
      border:0;
      border-radius:56px;
      padding:42px 34px 44px;
      background:rgba(255,255,255,.16)
    }
    .accent {
      color:var(--accent)
    }
    .price {
      font-size:82px;
      font-weight:300;
      color:var(--accent)
    }
    .image-well {
      height:560px;
      background:var(--black);
      border:0;
      border-radius:124px;
      display:grid;
      grid-template:1fr / 1fr;
      place-items:center;
      color:rgba(255,255,255,.72);
      font-size:28px;
      overflow:hidden;
      box-shadow:none
    }
    .image-well img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      min-width:0;
      min-height:0
    }
    .image-well.fit-contain img {
      object-fit:cover;
      padding:0
    }
    .ledger {
      display:grid;
      gap:18px
    }
    .ledger-row {
      display:grid;
      grid-template-columns:180px 1fr;
      gap:28px;
      border-top:1px solid var(--line);
      padding-top:18px;
      font-size:28px
    }
    .foot {
      margin-top:auto;
      border-top:1px solid var(--line);
      padding-top:18px;
      color:var(--muted);
      font:400 20px/1 var(--mono);
      display:flex;
      justify-content:space-between
    }
    .foot b,.foot .accent {
      color:inherit;
      font:inherit
    }
    .base-layer {
      margin-top:auto !important;
      margin-bottom:0 !important
    }
    .formula-stack {
      margin-top:auto;
      display:grid;
      gap:26px
    }
    .formula-stack .base-layer {
      margin-top:0 !important
    }
    .formula-stack + .foot {
      margin-top:34px
    }
    .base-layer + .foot {
      margin-top:24px
    }
    
	    .compare-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px
    }
    .compare-card {
      border:0;
      border-top:0;
      border-radius:56px;
      background:var(--black);
      color:#fff;
      padding:42px 34px 40px;
      display:grid;
      gap:16px;
      min-height:300px;
      overflow:hidden;
      box-shadow:none
    }
    .compare-card .label,.split-row .label,.formula-step .label {
      font-size:18px;
      font-weight:500;
      color:var(--accent);
      letter-spacing:.04em;
      text-transform:uppercase
    }
    .compare-card .value {
      font-size:40px;
      line-height:1.12;
      font-weight:520
    }
    .compare-card .note,.risk,.issue-strip,.risk-strip {
      font-size:23px;
      line-height:1.35;
      color:var(--muted)
    }
    .compare-card .note {
      color:rgba(255,255,255,.74)
    }
    .split-row {
      display:grid;
      grid-template-columns:220px 1fr;
      gap:28px;
      align-items:start;
      border-top:1px solid var(--line);
      padding:20px 0
    }
    .split-row .label {
      align-self:start;
      padding-top:.42em
    }
    .split-row .body {
      margin:0
    }
    .stamp {
      display:inline-flex;
      place-items:center;
      align-items:center;
      justify-content:center;
      width:fit-content;
      max-width:100%;
      min-height:78px;
      border:0;
      border-radius:999px;
      color:var(--accent-on);
      background:var(--accent);
      font-size:46px;
      font-weight:760;
      line-height:1;
      padding:16px 34px;
      text-align:center;
      overflow:hidden
    }
    .verdict-pill {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:fit-content;
      max-width:100%;
      min-height:78px;
      border:0;
      border-radius:40px;
      color:var(--accent-on);
      background:var(--accent);
      font-size:46px;
      font-weight:760;
      line-height:1;
      padding:16px 34px;
      text-align:center;
      overflow:hidden
    }
    .risk-strip,.issue-strip {
      border-top:1px solid var(--line);
      padding:18px;
      display:grid;
      gap:10px;
      overflow:hidden
    }
    .risk {
      position:relative;
      padding-left:18px;
      color:var(--ink)
    }
    .risk::before,
    .issue-strip > span::before {
      content:"";
      position:absolute;
      left:0;
      top:.675em;
      transform:translateY(-50%);
      width:7px;
      height:7px;
      border-radius:999px;
      background:var(--accent)
    }
    .issue-strip > span {
      position:relative;
      padding-left:18px
    }
    .issue-strip {
      padding-left:18px;
      padding-right:18px;
      background:linear-gradient(90deg,var(--soft),transparent);
      border-radius:40px
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))),
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) {
      grid-template-columns:repeat(3,1fr);
      gap:0;
      padding:0;
      border-left:0;
      border-right:0;
      border-radius:0;
      background:transparent;
      box-shadow:none;
      margin-top:auto
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) + .foot,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) + .foot {
      margin-top:34px
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * {
      min-height:128px;
      padding:24px 28px;
      display:grid;
      align-content:start;
      gap:12px;
      padding-left:28px;
      background:transparent
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * + *,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * + * {
      border-left:1px solid var(--line)
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *::before,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *::before {
      display:none
    }
    .risk-strip strong,
    .issue-strip strong {
      display:block;
      color:var(--ink);
      font-size:34px;
      line-height:1.08;
      font-weight:520
    }
    .risk-strip em,
    .issue-strip em {
      display:block;
      color:var(--muted);
      font-style:normal;
      font-size:24px;
      line-height:1.35
    }
    .price-formula {
      display:grid;
      grid-template-columns:1fr auto 1fr auto 1fr;
      gap:18px;
      align-items:stretch
    }
    .formula-step {
      border:0;
      border-radius:56px;
      background:var(--black);
      color:#fff;
      min-height:210px;
      padding:46px 34px;
      display:grid;
      align-content:space-between;
      overflow:hidden
    }
    .formula-step .num {
      font-size:62px;
      font-weight:360;
      color:#fff;
      font-variant-numeric:tabular-nums
    }
    .formula-arrow {
      display:grid;
      place-items:center;
      color:var(--accent);
      font-size:52px
    }
    .bws-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px
    }
    .bws-card {
      border:0;
      border-top:0;
      border-radius:56px;
      padding:38px 30px 42px;
      background:var(--black);
      color:#fff;
      min-height:300px;
      display:grid;
      align-content:start;
      gap:24px;
      overflow:hidden
    }
    .bws-card .tag {
      font-size:19px;
      font-weight:760;
      color:var(--accent)
    }
    .sample-compare {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px
    }
    .sample-pair {
      margin:0;
      border:0;
      border-radius:56px;
      background:var(--black);
      overflow:hidden
    }
    .sample-pair img {
      width:100%;
      height:360px;
      object-fit:cover;
      display:block
    }
    .sample-pair figcaption {
      padding:14px 16px;
      font-size:22px;
      color:var(--muted)
    }
    .zoom-strip {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px
    }
    .zoom-cell {
      border:0;
      border-radius:44px;
      background:var(--soft);
      min-height:112px;
      padding:24px 22px;
      font-size:20px;
      color:var(--muted);
      overflow:hidden
    }
    .decision-button {
      width:100%;
      min-height:96px;
      border:0;
      border-radius:44px;
      background:var(--black);
      color:#fff;
      display:grid;
      place-items:center;
      padding:24px 36px;
      font-size:34px;
      line-height:1.15;
      font-weight:520;
      text-align:center
    }
    .decision-button.accent {
      background:var(--accent);
      color:var(--accent-on)
    }
    .mono-pill-row {
      display:flex;
      flex-wrap:wrap;
      gap:8px
    }
    .mono-pill {
      width:fit-content;
      max-width:100%;
      border-radius:999px;
      background:var(--soft);
      color:var(--ink);
      padding:8px 13px;
      font:500 20px/1 var(--mono);
      letter-spacing:.02em;
      text-transform:uppercase
    }
    .benefit-row {
      display:flex;
      align-items:flex-start;
      gap:18px;
      border:0;
      border-radius:48px;
      background:var(--soft);
      padding:30px 28px 32px;
      font-size:30px;
      line-height:1.32
    }
    .benefit-number {
      flex:0 0 auto;
      min-width:68px;
      border-radius:32px;
      background:var(--black);
      color:#fff;
      padding:8px 10px;
      text-align:center;
      font:500 28px/1 var(--mono)
    }
    .media-stack {
      min-height:500px;
      border-radius:220px;
      background:var(--black);
      display:grid;
      place-items:center;
      padding:54px;
      overflow:hidden
    }
    .media-stack img {
      max-width:74%;
      max-height:78%;
      object-fit:contain;
      border-radius:10px;
      box-shadow:32px 28px 0 rgba(255,255,255,.18),64px 54px 0 rgba(0,0,0,.22)
    }
    .surface-violet { background:#6C3BFF; color:#fff }
    .surface-lime { background:#9BFF57; color:#111 }
    .surface-black { background:#1D1A1B; color:#fff }
    .surface-white { background:#F7F5F1; color:#111 }
    html[data-palette="lime-blue"] .surface-violet { background:#1598E8; color:#fff }
    html[data-palette="lime-blue"] .surface-lime { background:#DFFF3A; color:#111 }
    html[data-palette="lime-blue"] .surface-black { background:#171718; color:#fff }
    html[data-palette="violet-pink"] .surface-violet { background:#6C4CFF; color:#fff }
    html[data-palette="violet-pink"] .surface-lime { background:#F5B9E6; color:#111 }
    html[data-palette="violet-pink"] .surface-black { background:#191719; color:#fff }
    .surface-white .body,
    .surface-lime .body {
      color:rgba(17,17,17,.74)
    }
    .surface-black .body,
    .surface-violet .body {
      color:rgba(255,255,255,.76)
    }
    .avatar-ring {
      min-height:180px;
      position:relative
    }
    .avatar-ring img {
      position:absolute;
      width:112px;
      height:112px;
      border-radius:999px;
      object-fit:cover;
      border:4px solid var(--paper);
      background:var(--black)
    }
  </style>
</head>
<body>
  <main class="sheet">
    <!-- POSTERS_HERE -->
    <section class="poster template-preview tone-violet" data-page-type="cover-verdict">
      <div class="content">
        <div class="mono-pill-row">
          <span class="mono-pill">DIGITAL POP</span>
          <span class="mono-pill">BUY / WAIT / SKIP</span>
        </div>
        <h1 class="h-xl">替换成你的产品判断标题</h1>
        <p class="lead">首页建议同时出现两种主色、黑色和白色。</p>
        <div class="decision-button">把最终动作写成大按钮</div>
        <div class="grid-3 base-layer">
          <article class="panel surface-white"><strong>价值</strong><p class="body">一句话说明核心买点。</p></article>
          <article class="panel surface-lime"><strong>差异</strong><p class="body">说明付费或升级理由。</p></article>
          <article class="panel surface-black"><strong>动作</strong><p class="body">给出买、等或跳过。</p></article>
        </div>
        <div class="foot"><span>SMZDM REVIEW · DIGITAL POP</span><span>01</span></div>
      </div>
    </section>
  </main>
</body>
</html>
