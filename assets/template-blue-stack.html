<!doctype html>
<html lang="zh-CN" data-style="blue-stack" data-palette="blue-core">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMZDM Review Verdict Deck · Blue Stack</title>
  <style>
    :root {
      --black:#000;
      --dark:#12161b;
      --dark-2:#20252c;
      --white:#f7f8fb;
      --paper:#eef0f3;
      --ink:#050608;
      --muted:#7c8593;
      --muted-dark:#9aa3b2;
      --blue:#2f8cff;
      --blue-2:#58adff;
      --line:rgba(124,133,147,.52);
      --dot-rule:rgba(124,133,147,.56);
      --dot-rule-strong:rgba(124,133,147,.68);
      --dash:2px;
      --dash-gap:8px;
      --dash-v-gap:10px;
      --sans:Inter,"PingFang SC","Noto Sans SC",Arial,sans-serif;
      --mono:"IBM Plex Mono","SFMono-Regular",Menlo,Consolas,monospace
    }
    * {
      box-sizing:border-box
    }
    body {
      margin:0;
      background:#050608;
      color:var(--white);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased
    }
    .sheet {
      display:grid;
      gap:32px;
      padding:32px;
      place-items:center
    }
    .poster {
      width:1080px;
      height:1440px;
      overflow:hidden;
      position:relative;
      background:var(--black);
      color:var(--white);
      padding:44px;
      display:flex;
      flex-direction:column
    }
    .template-preview {
      width:1080px;
      height:1440px;
      overflow:hidden;
      position:relative;
      background:#000;
      color:#fff;
      padding:44px;
      display:flex;
      flex-direction:column
    }
    .poster.surface-light {
      background:var(--paper);
      color:var(--ink)
    }
    .poster.hero-blue {
      background:#000;
      color:#fff
    }
    .blue-gradient-field {
      position:absolute;
      inset:0;
      z-index:0;
      background:#fff;
      overflow:hidden;
      isolation:isolate
    }
    .blue-gradient-field::before,
    .blue-gradient-field::after,
    .blue-stage::before,
    .blue-stage::after {
      content:"";
      position:absolute;
      left:50%;
      border-radius:50%;
      transform:translateX(-50%)
    }
    .blue-gradient-field::before {
      z-index:1;
      width:210%;
      height:160%;
      top:-120%;
      background:#010102;
      filter:blur(210px)
    }
    .blue-gradient-field::after {
      z-index:2;
      left:-14%;
      width:128%;
      height:30%;
      top:78%;
      background:#fff;
      border-radius:50% 50% 0 0 / 34% 34% 0 0;
      filter:blur(34px)
    }
    .blue-stage {
      position:absolute;
      inset:0;
      z-index:0;
      background:#fff;
      overflow:hidden
    }
    .blue-stage::before {
      width:192%;
      height:153%;
      top:-46%;
      background:#ebf4ff;
      filter:blur(160px)
    }
    .blue-stage::after {
      width:178%;
      height:160%;
      top:-92%;
      background:#298dff;
      filter:blur(160px)
    }
    .blue-color-wash {
      position:absolute;
      inset:0;
      z-index:3;
      background:#298dff;
      opacity:.78;
      mix-blend-mode:color;
      pointer-events:none
    }
    .content {
      position:relative;
      z-index:1;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:28px
    }
    .stack-topbar {
      height:76px;
      background:var(--dark);
      color:var(--white);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 24px;
      font-size:22px;
      line-height:1
    }
    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      font-size:31px;
      font-weight:620
    }
    .drop {
      width:24px;
      height:34px;
      border:4px solid currentColor;
      border-radius:50% 50% 56% 56%;
      transform:rotate(-20deg);
      display:inline-block
    }
    .nav {
      display:flex;
      align-items:center;
      gap:28px;
      color:#e5e8ee
    }
    .nav span {
      display:flex;
      align-items:center;
      gap:10px
    }
    .plus {
      width:38px;
      height:38px;
      background:#303743;
      display:grid;
      place-items:center;
      font-size:30px;
      line-height:1
    }
    .cta {
      background:var(--blue);
      color:#fff;
      padding:18px 22px;
      min-width:116px;
      text-align:center
    }
    .kicker {
      color:var(--muted-dark);
      font:650 20px/1 var(--mono);
      letter-spacing:.08em;
      text-transform:uppercase
    }
    .surface-light .kicker {
      color:var(--muted)
    }
    .h-xl {
      margin:0;
      font-size:112px;
      line-height:.98;
      font-weight:430;
      letter-spacing:0
    }
    .h-md {
      margin:0;
      font-size:66px;
      line-height:1.08;
      font-weight:430;
      letter-spacing:0
    }
    .h-xl span,
    .h-md span {
      display:block
    }
    .lead {
      margin:0;
      max-width:820px;
      color:var(--muted-dark);
      font-size:31px;
      line-height:1.42
    }
    .surface-light .lead {
      color:#3e4652
    }
    .body {
      margin:0;
      color:var(--muted-dark);
      font-size:27px;
      line-height:1.42
    }
    .surface-light .body {
      color:#4e5968
    }
    .blue {
      color:var(--blue)
    }
    .hero-center {
      flex:1;
      min-height:0;
      display:grid;
      align-content:center;
      justify-items:center;
      text-align:center;
      gap:56px
    }
    .glow-title {
      font-size:146px;
      line-height:1.02;
      font-weight:420;
      letter-spacing:0;
      text-shadow:0 0 18px rgba(220,240,255,.88),0 0 44px rgba(119,194,255,.86),0 0 96px rgba(47,140,255,.78)
    }
    .hero-sub {
      max-width:650px;
      color:rgba(255,255,255,.92);
      font-size:28px;
      line-height:1.34
    }
    .hero-actions {
      display:grid;
      grid-template-columns:1fr 1fr;
      min-width:320px;
      height:72px
    }
    .hero-actions span {
      display:grid;
      place-items:center;
      font-size:22px;
      background:#fff;
      color:#000
    }
    .hero-actions span:first-child {
      background:#000;
      color:#fff
    }
    .giant-statement {
      margin-top:18px;
      font-size:94px;
      line-height:1.05;
      font-weight:420;
      color:#000
    }
    .highlight-line {
      display:inline;
      background:#000;
      color:#fff;
      box-decoration-break:clone;
      -webkit-box-decoration-break:clone;
      padding:0 .13em
    }
    .inline-icon {
      display:inline-grid;
      width:.95em;
      height:.95em;
      vertical-align:-.12em;
      place-items:center;
      background:var(--blue);
      color:#fff;
      margin:0 .08em
    }
    .inline-icon i,
    .tile-icon i,
    .card-icon i,
    .step-icon i {
      width:62%;
      height:62%;
      display:block
    }
    .dot-rule {
      height:2px;
      border:0;
      background:repeating-linear-gradient(90deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap)))
    }
    .dark-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px
    }
    .stack-card {
      min-height:360px;
      background:var(--dark);
      padding:34px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border:0
    }
    .card-head {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      color:#fff;
      font-size:31px
    }
    .card-icon {
      width:56px;
      height:56px;
      display:grid;
      place-items:center;
      color:#fff
    }
    .ghost-icons {
      display:flex;
      gap:22px;
      color:#7e8797;
      font:700 42px/1 var(--mono)
    }
    .stack-card .dot-rule {
      margin:34px 0
    }
    .corner-list {
      display:grid;
      gap:24px
    }
    .corner-list div {
      position:relative;
      padding-left:42px;
      color:#dfe5ef;
      font-size:27px;
      line-height:1.35
    }
    .corner-list div::before {
      content:"";
      position:absolute;
      left:0;
      top:.55em;
      width:30px;
      height:13px;
      border-left:3px solid var(--blue);
      border-bottom:3px solid var(--blue)
    }
    .blue-button-row {
      display:flex;
      align-items:center;
      gap:18px;
      color:#fff;
      font-size:23px
    }
    .blue-square {
      width:58px;
      height:58px;
      background:var(--blue);
      display:grid;
      place-items:center;
      color:#fff;
      font-size:34px
    }
    .image-panel {
      background:var(--dark);
      min-height:430px;
      overflow:hidden;
      display:grid
    }
    .image-panel.evidence-frame {
      min-height:650px
    }
    .image-panel.light {
      background:#fff
    }
    .image-panel img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block
    }
    .image-panel.contain img {
      object-fit:contain;
      padding:28px;
      background:#f5f7fb
    }
    .media-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px
    }
    .media-caption {
      margin:0;
      padding:24px 0 0;
      color:var(--muted-dark);
      font-size:24px;
      line-height:1.34
    }
    .surface-light .media-caption {
      color:#566170
    }
    .feature-list {
      margin-top:18px;
      display:grid;
      gap:0
    }
    .feature-row {
      min-height:140px;
      display:grid;
      grid-template-columns:1fr 76px;
      align-items:center;
      gap:22px;
      position:relative;
      background:repeating-linear-gradient(90deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap))) top left/100% 2px no-repeat;
      font-size:55px;
      line-height:1.08;
      color:#000
    }
    .feature-row:last-child::after {
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      background:repeating-linear-gradient(90deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap)))
    }
    .feature-list.compact .feature-row {
      min-height:112px;
      font-size:34px;
      line-height:1.18
    }
    .feature-list.compact .tile-icon {
      width:64px;
      height:64px;
      justify-self:end
    }
    .tile-icon {
      width:76px;
      height:76px;
      display:grid;
      place-items:center;
      background:var(--blue);
      color:#fff
    }
    .steps {
      display:grid;
      margin-top:18px
    }
    .step-row {
      min-height:180px;
      display:grid;
      grid-template-columns:48px 1fr 410px;
      gap:34px;
      align-items:center;
      position:relative;
      background:repeating-linear-gradient(90deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap))) top left/100% 2px no-repeat
    }
    .step-row:last-child::after {
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      background:repeating-linear-gradient(90deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap)))
    }
    .step-dot {
      width:18px;
      height:18px;
      background:var(--blue)
    }
    .step-title {
      color:#fff;
      font-size:64px;
      line-height:1.05
    }
    .step-copy {
      color:#697383;
      font-size:25px;
      line-height:1.36
    }
    .steps.compact-steps .step-row {
      min-height:96px;
      grid-template-columns:28px 1fr 360px;
      gap:28px
    }
    .steps.compact-steps .step-title {
      font-size:36px
    }
    .steps.compact-steps .step-copy {
      font-size:23px
    }
    .build-head {
      min-height:200px;
      display:grid;
      grid-template-columns:128px 1fr;
      grid-template-rows:auto auto;
      column-gap:36px;
      row-gap:14px;
      align-items:center;
      padding:0
    }
    .build-head .tile-icon {
      width:128px;
      height:128px;
      grid-row:1;
      align-self:center
    }
    .build-head h2 {
      margin:0;
      color:#fff;
      font-size:67px;
      font-weight:430;
      align-self:center
    }
    .build-head p {
      margin:0;
      color:#9aa3b2;
      font-size:27px;
      line-height:1.35;
      grid-column:2;
      align-self:start;
      max-width:650px
    }
    .build-head + .wide-cta {
      margin-left:164px;
      width:calc(100% - 164px)
    }
    .wide-cta {
      height:62px;
      background:var(--blue);
      color:#fff;
      display:flex;
      align-items:center;
      gap:18px;
      padding:0 24px;
      font-size:25px
    }
    .compare-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px
    }
    .compare-card {
      min-height:350px;
      padding:34px;
      background:#fff;
      color:#000;
      display:flex;
      flex-direction:column;
      justify-content:space-between
    }
    .compare-card.dark {
      background:var(--dark);
      color:#fff
    }
    .compare-card .label {
      color:var(--blue);
      font:700 20px/1 var(--mono);
      letter-spacing:.08em;
      text-transform:uppercase
    }
    .compare-card .value {
      font-size:58px;
      line-height:1.08;
      font-weight:430
    }
    .compare-card .note {
      margin:0;
      color:#5d6674;
      font-size:25px;
      line-height:1.36
    }
    .compare-card.dark .note {
      color:#9aa3b2
    }
    .metric-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:0;
      position:relative;
      background:
        repeating-linear-gradient(90deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap))) top left/100% 2px no-repeat,
        repeating-linear-gradient(90deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap))) bottom left/100% 2px no-repeat
    }
    .metric {
      min-height:180px;
      padding:26px 24px;
      display:grid;
      align-content:space-between
    }
    .metric + .metric {
      background:repeating-linear-gradient(180deg,var(--dot-rule) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-v-gap))) left top/2px 100% no-repeat
    }
    .metric span {
      color:var(--blue);
      font:700 19px/1 var(--mono);
      letter-spacing:.08em;
      text-transform:uppercase
    }
    .metric strong {
      color:inherit;
      font-size:39px;
      line-height:1.1;
      font-weight:430
    }
    .hero-blue .metric {
      color:#050608
    }
    .hero-blue .metric strong {
      color:#050608
    }
    .verdict-panel {
      background:var(--blue);
      color:#fff;
      min-height:410px;
      padding:42px;
      display:grid;
      align-content:space-between
    }
    .verdict-panel span {
      font:700 20px/1 var(--mono);
      letter-spacing:.08em;
      text-transform:uppercase
    }
    .verdict-panel p {
      margin:0;
      font-size:62px;
      line-height:1.12
    }
    .verdict-panel.long p {
      font-size:46px;
      line-height:1.18
    }
    .base-layer {
      margin-top:auto
    }
    .foot {
      margin-top:auto;
      padding-top:18px;
      border-top:0;
      background:repeating-linear-gradient(90deg,var(--dot-rule-strong) 0 var(--dash),transparent var(--dash) calc(var(--dash) + var(--dash-gap))) top left/100% 2px no-repeat;
      color:var(--muted-dark);
      font:650 19px/1 var(--mono);
      display:flex;
      justify-content:space-between
    }
    .surface-light .foot {
      color:var(--muted)
    }
    .base-layer + .foot {
      margin-top:26px
    }
  </style>
</head>
<body>
  <main class="sheet">
    <!-- POSTERS_HERE -->
    <section class="poster template-preview hero-blue" data-page-type="cover-verdict" aria-label="Blue Stack template preview">
      <div class="blue-gradient-field" aria-hidden="true">
        <div class="blue-stage"></div>
        <div class="blue-color-wash"></div>
      </div>
      <div class="content">
        <div class="hero-center">
          <div class="kicker">TEMPLATE PREVIEW · BLUE STACK</div>
          <h1 class="glow-title">蓝栈<br>构建系统</h1>
          <p class="hero-sub">黑到蓝再到淡蓝的技术平台封面，适合基础设施、开发者工具与高价值硬件评测。</p>
          <div class="hero-actions">
            <span>技术平台</span>
            <span>价值判断</span>
          </div>
        </div>
        <div class="metric-grid base-layer">
          <div class="metric panel">
            <span>STYLE</span>
            <strong>BLUE STACK</strong>
          </div>
          <div class="metric panel">
            <span>ROLE</span>
            <strong>蓝黑构建感</strong>
          </div>
          <div class="metric panel">
            <span>USE</span>
            <strong>替换占位生成</strong>
          </div>
        </div>
        <div class="foot">
          <span>SEED TEMPLATE</span>
          <span>PREVIEW</span>
        </div>
      </div>
    </section>
  </main>
  <script src="assets/icon/icons.js"></script>
</body>
</html>
