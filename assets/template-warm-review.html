<!doctype html>
<html lang="zh-CN" data-style="warm-review" data-palette="kelvin-glow">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMZDM Review Verdict Deck · Warm Review</title>
  <style>
    :root {
      --paper:#f0e7d6;
      --paper-2:#e7dbc4;
      --ink:#2e2b29;
      --muted:#8a8073;
      --line:#d8c9af;
      --accent:#e54f10;
      --wash:rgba(229,79,16,.12);
      --glow:#daae87;
      --basalt:#171310;
      --dot:rgba(46,43,41,.18);
      --dash:rgba(229,79,16,.42);
      --serif:"Noto Serif SC","Songti SC",Georgia,serif;
      --sans:Inter,"PingFang SC","Noto Sans SC",Arial,sans-serif;
      --mono:"IBM Plex Mono","SFMono-Regular",Menlo,monospace
    }
    
    html[data-palette="indigo-paper"] {
      --paper:#eef0e8;
      --paper-2:#dfe4dc;
      --ink:#262b35;
      --muted:#717b86;
      --line:#c8d0c8;
      --accent:#3157a4;
      --wash:rgba(49,87,164,.12);
      --glow:#b5bda6;
      --basalt:#1d2229;
      --dot:rgba(38,43,53,.16);
      --dash:rgba(49,87,164,.34)
    }
    
    html[data-palette="forest-paper"] {
      --paper:#edf0df;
      --paper-2:#dfe5cc;
      --ink:#272d23;
      --muted:#717963;
      --line:#cbd3b9;
      --accent:#2f7a4e;
      --wash:rgba(47,122,78,.12);
      --glow:#b7c693;
      --basalt:#1f251d;
      --dot:rgba(39,45,35,.16);
      --dash:rgba(47,122,78,.34)
    }

    html[data-palette="forest-paper"] .verdict-letter,
    html[data-palette="indigo-paper"] .verdict-letter {
      background:var(--basalt);
      color:var(--paper)
    }

    html[data-palette="forest-paper"] .verdict-letter .label,
    html[data-palette="forest-paper"] .verdict-letter p,
    html[data-palette="indigo-paper"] .verdict-letter .label,
    html[data-palette="indigo-paper"] .verdict-letter p {
      color:var(--paper)
    }

    html[data-palette="kelvin-glow"] {
      --paper:#c73708;
      --paper-2:#EDBD92;
      --ink:#EDBD92;
      --muted:rgba(237,189,146,.72);
      --line:rgba(237,189,146,.58);
      --accent:#EDBD92;
      --wash:rgba(237,189,146,.12);
      --glow:#EDBD92;
      --basalt:#19110d;
      --dot:rgba(237,189,146,.34);
      --dash:rgba(237,189,146,.52)
    }

    html[data-palette="cream-orange"] {
      --paper:#eeecd4;
      --paper-2:#fff6dc;
      --ink:#e94710;
      --muted:rgba(233,71,16,.68);
      --line:rgba(233,71,16,.46);
      --accent:#e94710;
      --wash:rgba(233,71,16,.08);
      --glow:#f2b28e;
      --basalt:#23231f;
      --dot:rgba(233,71,16,.3);
      --dash:rgba(233,71,16,.48)
    }
    
    * {
      box-sizing:border-box
    }
     body {
      margin:0;
      background:#ddd2c0;
      font-family:var(--sans);
      color:var(--ink)
    }
     .sheet {
      display:grid;
      gap:32px;
      padding:32px;
      place-items:center
    }
    
    .poster {
      width:1080px;
      height:1440px;
      overflow:hidden;
      background:
        radial-gradient(circle at 82% 10%,rgba(218,174,135,.22),transparent 24%),
        radial-gradient(circle at 18% 12%,var(--wash),transparent 28%),
        linear-gradient(135deg,var(--paper),#f7eedc);
      padding:88px;
      display:flex;
      flex-direction:column;
      border:0;
      position:relative
    }
    
    .poster::before {
      content:"";
      position:absolute;
      inset:70px 76px;
      pointer-events:none;
      background-image:
        repeating-linear-gradient(to bottom,var(--dash) 0 2px,transparent 2px 8px),
        repeating-linear-gradient(to bottom,var(--dash) 0 2px,transparent 2px 8px),
        repeating-linear-gradient(to bottom,var(--dash) 0 2px,transparent 2px 8px);
      background-size:1px 100%,1px 100%,1px 100%;
      background-position:13% 0,50% 0,87% 0;
      background-repeat:no-repeat;
      opacity:.2
    }
    
    .poster::after {
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(var(--dot) .8px,transparent .8px);
      background-size:14px 14px;
      opacity:.18;
      pointer-events:none
    }
    .content {
      position:relative;
      z-index:1;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:28px
    }
    html[data-palette="kelvin-glow"] body {
      background:#8f2608
    }
    html[data-palette="cream-orange"] body {
      background:#EDBD92
    }
    html[data-palette="kelvin-glow"] .poster,
    html[data-palette="cream-orange"] .poster {
      background:var(--paper);
      color:var(--ink);
      font-family:var(--serif);
      padding:64px 88px 44px
    }
    html[data-palette="kelvin-glow"] .poster::before,
    html[data-palette="cream-orange"] .poster::before {
      display:none
    }
    html[data-palette="kelvin-glow"] .poster::after,
    html[data-palette="cream-orange"] .poster::after {
      display:none
    }
    html[data-palette="kelvin-glow"] .h-xl,
    html[data-palette="kelvin-glow"] .h-md,
    html[data-palette="kelvin-glow"] .lead,
    html[data-palette="cream-orange"] .h-xl,
    html[data-palette="cream-orange"] .h-md,
    html[data-palette="cream-orange"] .lead {
      font-family:var(--serif);
      font-weight:430;
      letter-spacing:0
    }
    html[data-palette="kelvin-glow"] .h-xl,
    html[data-palette="cream-orange"] .h-xl {
      font-size:118px;
      line-height:.96
    }
    html[data-palette="kelvin-glow"] .lead,
    html[data-palette="cream-orange"] .lead {
      color:var(--ink);
      font-size:34px;
      line-height:1.2
    }
    html[data-palette="kelvin-glow"] .panel,
    html[data-palette="cream-orange"] .panel {
      border-top:0;
      padding:30px 26px;
      background:rgba(255,255,255,.08)
    }
    html[data-palette="cream-orange"] .panel {
      background:rgba(233,71,16,.045)
    }
    html[data-palette="kelvin-glow"] .poster[data-page-type="cover-verdict"] .panel,
    html[data-palette="cream-orange"] .poster[data-page-type="cover-verdict"] .panel {
      border:1px dashed var(--dash)
    }
    html[data-palette="kelvin-glow"] .compare-card,
    html[data-palette="kelvin-glow"] .formula-step,
    html[data-palette="kelvin-glow"] .bws-card,
    html[data-palette="kelvin-glow"] .zoom-cell,
    html[data-palette="cream-orange"] .compare-card,
    html[data-palette="cream-orange"] .formula-step,
    html[data-palette="cream-orange"] .bws-card,
    html[data-palette="cream-orange"] .zoom-cell {
      background:rgba(255,255,255,.1);
      border-color:var(--dash);
      color:var(--ink)
    }
    html[data-palette="kelvin-glow"] .poster[data-page-type="variant-comparison"] .compare-card,
    html[data-palette="cream-orange"] .poster[data-page-type="variant-comparison"] .compare-card {
      background:var(--paper-2);
      color:var(--paper);
      border:0;
      box-shadow:none;
      min-height:380px;
      padding:36px 40px
    }
    html[data-palette="kelvin-glow"] .poster[data-page-type="variant-comparison"] .compare-card .value,
    html[data-palette="cream-orange"] .poster[data-page-type="variant-comparison"] .compare-card .value {
      font-size:60px;
      line-height:1.04;
      font-weight:580
    }
    html[data-palette="kelvin-glow"] .poster[data-page-type="variant-comparison"] .compare-card .label,
    html[data-palette="kelvin-glow"] .poster[data-page-type="variant-comparison"] .compare-card .value,
    html[data-palette="kelvin-glow"] .poster[data-page-type="variant-comparison"] .compare-card .note,
    html[data-palette="cream-orange"] .poster[data-page-type="variant-comparison"] .compare-card .label,
    html[data-palette="cream-orange"] .poster[data-page-type="variant-comparison"] .compare-card .value,
    html[data-palette="cream-orange"] .poster[data-page-type="variant-comparison"] .compare-card .note {
      color:var(--paper)
    }
    html[data-palette="kelvin-glow"] .zoom-cell,
    html[data-palette="cream-orange"] .zoom-cell {
      min-height:128px;
      display:grid;
      align-content:center;
      font-size:22px;
      line-height:1.36
    }
    html[data-palette="kelvin-glow"] .compare-card .note,
    html[data-palette="kelvin-glow"] .risk,
    html[data-palette="kelvin-glow"] .issue-strip,
    html[data-palette="kelvin-glow"] .risk-strip,
    html[data-palette="cream-orange"] .compare-card .note,
    html[data-palette="cream-orange"] .risk,
    html[data-palette="cream-orange"] .issue-strip,
    html[data-palette="cream-orange"] .risk-strip {
      color:var(--ink)
    }
    html[data-palette="kelvin-glow"] .foot,
    html[data-palette="cream-orange"] .foot {
      border-top:0;
      padding-top:0
    }
    .kicker {
      font:650 20px/1 var(--mono);
      letter-spacing:.14em;
      color:var(--accent);
      text-transform:uppercase;
      width:fit-content;
      border:1px dashed var(--dash);
      border-radius:999px;
      padding:9px 14px;
      background:rgba(255,252,244,.22)
    }
    .h-xl {
      font-family:var(--serif);
      font-size:96px;
      line-height:1.08;
      font-weight:520;
      letter-spacing:0;
      margin:24px 0
    }
    .h-md {
      font-family:var(--serif);
      font-size:56px;
      line-height:1.16;
      font-weight:520;
      letter-spacing:0;
      margin:0 0 26px
    }
    .h-xl span,
    .h-md span {
      display:block
    }
    .lead {
      font-family:var(--serif);
      font-size:34px;
      line-height:1.48
    }
    .body {
      font-size:28px;
      line-height:1.5
    }
    .grid-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px
    }
    .grid-3 {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px
    }
    .panel {
      border-top:1px dashed var(--line);
      padding:24px 0;
      position:relative
    }
    .accent {
      color:var(--accent)
    }
    .price {
      font-family:var(--serif);
      font-size:72px;
      color:var(--accent)
    }
    .image-well {
      height:560px;
      background:var(--paper-2);
      border:1px dashed var(--line);
      display:grid;
      grid-template:1fr / 1fr;
      place-items:center;
      color:var(--muted);
      font-size:28px;
      overflow:hidden
    }
    .image-well img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      min-width:0;
      min-height:0
    }
    .poster[data-page-type="evidence-sample"] .image-well {
      height:650px
    }
    .poster[data-page-type="cover-verdict"] .content {
      gap:22px
    }
    .poster[data-page-type="cover-verdict"] .image-well {
      height:470px;
      margin-top:14px;
      background:transparent;
      border:0
    }
    .poster[data-page-type="cover-verdict"] .image-well img {
      object-fit:cover;
      mix-blend-mode:normal;
      padding:0
    }
    .ledger {
      display:grid;
      gap:18px
    }
    .ledger-row {
      display:grid;
      grid-template-columns:180px 1fr;
      gap:28px;
      border-top:1px dashed var(--line);
      padding-top:18px;
      font-size:28px
    }
    .foot {
      margin-top:auto;
      border-top:1px dashed var(--line);
      padding-top:18px;
      color:var(--muted);
      font:500 20px/1 var(--mono);
      display:flex;
      justify-content:space-between
    }
    .base-layer {
      margin-top:auto !important;
      margin-bottom:0 !important
    }
    .formula-stack {
      margin-top:auto;
      display:grid;
      gap:26px
    }
    .formula-stack .base-layer {
      margin-top:0 !important
    }
    .formula-stack + .foot {
      margin-top:34px
    }
    .base-layer + .foot {
      margin-top:24px
    }
    
	    .compare-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px
    }
    .compare-card {
      background:rgba(255,252,244,.42);
      border:1px dashed var(--line);
      box-shadow:inset 0 0 0 8px rgba(255,255,255,.12);
      padding:28px;
      display:grid;
      gap:16px;
      min-height:320px;
      overflow:hidden
    }
    .compare-card .label,.split-row .label,.formula-step .label {
      font:650 18px/1 var(--mono);
      color:var(--accent);
      letter-spacing:.12em;
      text-transform:uppercase
    }
    .compare-card .value {
      font-family:var(--serif);
      font-size:38px;
      line-height:1.18
    }
    .compare-card .note,.risk,.issue-strip,.risk-strip {
      font-size:23px;
      line-height:1.42;
      color:var(--muted)
    }
    .split-row {
      display:grid;
      grid-template-columns:210px 1fr;
      gap:28px;
      align-items:start;
      border-top:1px dashed var(--line);
      padding:22px 0
    }
    .split-row .label {
      align-self:start;
      padding-top:.42em
    }
    .split-row .body {
      margin:0
    }
    .stamp {
      display:inline-flex;
      place-items:center;
      align-items:center;
      justify-content:center;
      width:fit-content;
      max-width:100%;
      min-height:78px;
      border:1px dashed var(--accent);
      border-radius:999px;
      color:var(--accent);
      font-family:var(--serif);
      font-size:40px;
      line-height:1.08;
      padding:16px 34px;
      text-align:center;
      background:var(--wash);
      overflow:hidden
    }
    .verdict-pill {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:fit-content;
      max-width:100%;
      min-height:78px;
      border:1px dashed var(--accent);
      border-radius:999px;
      color:var(--accent);
      font-family:var(--serif);
      font-size:40px;
      line-height:1.08;
      padding:16px 34px;
      text-align:center;
      background:var(--wash);
      overflow:hidden
    }
    .risk-strip,.issue-strip {
      border-top:1px dashed var(--line);
      border-bottom:1px dashed var(--line);
      padding:18px 0;
      display:grid;
      gap:10px;
      background:rgba(255,255,255,.16);
      overflow:hidden
    }
    .risk {
      position:relative;
      padding-left:18px;
      color:var(--ink)
    }
    .risk::before,
    .issue-strip > span::before {
      content:"";
      position:absolute;
      left:0;
      top:.675em;
      transform:translateY(-50%);
      width:7px;
      height:7px;
      border-radius:999px;
      background:var(--accent)
    }
    .issue-strip > span {
      position:relative;
      padding-left:18px
    }
    .issue-strip {
      padding-left:18px;
      padding-right:18px;
      font-family:var(--serif);
      color:var(--ink)
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))),
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) {
      grid-template-columns:repeat(3,1fr);
      gap:0;
      padding:0;
      border-left:0;
      border-right:0;
      border-radius:0;
      background:transparent;
      box-shadow:none;
      margin-top:auto
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) + .foot,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) + .foot {
      margin-top:34px
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * {
      min-height:132px;
      padding:24px 28px;
      display:grid;
      align-content:start;
      gap:12px;
      padding-left:28px;
      background:transparent
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * + *,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * + * {
      border-left:1px dashed var(--line)
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *::before,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *::before {
      display:none
    }
    .risk-strip strong,
    .issue-strip strong {
      display:block;
      color:var(--ink);
      font-family:var(--serif);
      font-size:34px;
      line-height:1.08;
      font-weight:640
    }
    .risk-strip em,
    .issue-strip em {
      display:block;
      color:var(--muted);
      font-style:normal;
      font-size:24px;
      line-height:1.38
    }
    .price-formula {
      display:grid;
      grid-template-columns:1fr auto 1fr auto 1fr;
      gap:18px;
      align-items:stretch
    }
    .formula-step {
      background:rgba(255,252,244,.42);
      border:1px dashed var(--line);
      min-height:216px;
      padding:36px 30px;
      display:grid;
      align-content:space-between;
      overflow:hidden
    }
    .formula-step .num {
      font-family:var(--serif);
      font-size:62px;
      font-weight:360;
      color:var(--accent);
      font-variant-numeric:tabular-nums
    }
    .formula-arrow {
      display:grid;
      place-items:center;
      color:var(--accent);
      font-size:52px
    }
    .bws-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px
    }
    .bws-card {
      border:1px dashed var(--line);
      background:rgba(255,252,244,.36);
      padding:22px;
      min-height:300px;
      display:grid;
      align-content:start;
      gap:24px;
      overflow:hidden
    }
    .bws-card .tag {
      font:650 18px/1 var(--mono);
      color:var(--accent)
    }
    .sample-compare {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px
    }
    .sample-pair {
      margin:0;
      border:1px dashed var(--line);
      background:var(--paper-2);
      overflow:hidden
    }
    .sample-pair img {
      width:100%;
      height:360px;
      object-fit:cover;
      display:block
    }
    .sample-pair figcaption {
      padding:14px 16px;
      font-size:22px;
      color:var(--muted)
    }
    .zoom-strip {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px
    }
    .zoom-cell {
      border:1px dashed var(--line);
      background:var(--paper-2);
      min-height:112px;
      padding:14px;
      font-size:20px;
      color:var(--muted);
      overflow:hidden
    }
    .measurement-axis {
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:0;
      border-top:0;
      border-bottom:1px dashed var(--line);
      padding:0 0 16px;
      color:var(--muted);
      font:500 18px/1 var(--mono);
      letter-spacing:.04em
    }
    .measurement-axis span {
      position:relative;
      padding-top:16px
    }
    .measurement-axis span::before {
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:7px;
      height:7px;
      border-radius:999px;
      background:var(--accent)
    }
    .bracket-note {
      width:fit-content;
      max-width:100%;
      color:var(--accent);
      font:650 20px/1.15 var(--mono);
      letter-spacing:.04em
    }
    .bracket-note::before {
      content:"("
    }
    .bracket-note::after {
      content:")"
    }
    .dashed-rail {
      position:relative;
      padding-left:28px
    }
    .dashed-rail::before {
      content:"";
      position:absolute;
      left:6px;
      top:.15em;
      bottom:.15em;
      width:1px;
      background:repeating-linear-gradient(to bottom,var(--dash) 0 2px,transparent 2px 8px)
    }
    .decorative-point {
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--accent);
      display:inline-block;
      vertical-align:middle
    }
    .glow-line {
      height:1px;
      background:linear-gradient(90deg,transparent,var(--glow),transparent);
      opacity:.9
    }
    .ambient-wordmark {
      margin-top:auto;
      font:300 132px/.82 var(--sans);
      letter-spacing:.32em;
      color:var(--ink);
      white-space:nowrap;
      opacity:.92
    }
    .cover-dot-field {
      height:150px;
      margin:0 0 4px;
      background-image:radial-gradient(var(--dot) 1.8px,transparent 1.8px);
      background-size:24px 24px;
      opacity:.84;
      mask-image:linear-gradient(to bottom,#000 0%,#000 76%,transparent 100%)
    }
    .cover-meta {
      font:650 20px/1 var(--mono);
      letter-spacing:.22em;
      color:var(--muted);
      text-transform:uppercase
    }
    html[data-palette="kelvin-glow"] .poster[data-page-type="cover-verdict"] .cover-title,
    html[data-palette="cream-orange"] .poster[data-page-type="cover-verdict"] .cover-title {
      font-size:132px;
      line-height:.98;
