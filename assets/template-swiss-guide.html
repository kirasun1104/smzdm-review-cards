<!doctype html>
<html lang="zh-CN" data-style="swiss-guide" data-palette="smzdm-red">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMZDM Review Verdict Deck · Swiss Guide</title>
  <style>
    @font-face {
      font-family:"Aeonik-Regular";
      src:url("assets/fonts/Aeonik-Regular.woff2") format("woff2");
      font-weight:400;
      font-style:normal;
      font-display:swap
    }
    @font-face {
      font-family:"Aeonik-Medium";
      src:url("assets/fonts/Aeonik-Medium.woff2") format("woff2");
      font-weight:500;
      font-style:normal;
      font-display:swap
    }
    @font-face {
      font-family:"AeonikFono-Regular";
      src:url("assets/fonts/AeonikFono-Regular.woff2") format("woff2");
      font-weight:400;
      font-style:normal;
      font-display:swap
    }
    :root {
      --paper:#fafafa;
      --ink:#151515;
      --muted:#7c7c7c;
      --line:rgba(21,21,21,.14);
      --line-strong:rgba(21,21,21,.42);
      --soft:#f1f2f3;
      --glass:rgba(250,250,250,.58);
      --glass-strong:rgba(250,250,250,.76);
      --bottom-band:#151515;
      --accent:#FA0F00;
      --accent-on:#fff;
      --radius-media:28px;
      --radius-card:8px;
      --sans:"Aeonik-Regular",Inter,"PingFang SC","Noto Sans SC",Arial,sans-serif;
      --display:"Aeonik-Regular","Avenir Next Condensed","Arial Narrow",Inter,"PingFang SC","Noto Sans SC",Arial,sans-serif;
      --display-medium:"Aeonik-Medium","Avenir Next Condensed","Arial Narrow",Inter,"PingFang SC","Noto Sans SC",Arial,sans-serif;
      --mono:"AeonikFono-Regular","IBM Plex Mono","SFMono-Regular",Menlo,monospace
    }
    
    html[data-palette="smzdm-red"] {
      --accent:#FA0F00;
      --accent-on:#fff;
      --bottom-band:#151515
    }
    
    html[data-palette="ikb-blue"] {
      --accent:#0047ff;
      --accent-on:#fff;
      --bottom-band:#151515
    }
    
    html[data-palette="lemon-yellow"] {
      --accent:#DFD307;
      --accent-on:#111;
      --bottom-band:#151515
    }
    
    html[data-palette="vivid-green"] {
      --accent:#19d66b;
      --accent-on:#07140b;
      --bottom-band:#151515
    }
    
    html[data-palette="safety-orange"] {
      --accent:#ff5a1f;
      --accent-on:#fff;
      --bottom-band:#151515
    }
    
    * {
      box-sizing:border-box
    }
    body {
      margin:0;
      background:#e8eaed;
      font-family:var(--sans);
      color:var(--ink)
    }
    .sheet {
      display:grid;
      gap:32px;
      padding:32px;
      place-items:center
    }
    
    .poster {
      width:1080px;
      height:1440px;
      overflow:hidden;
      background:var(--paper);
      padding:84px;
      display:flex;
      flex-direction:column;
      position:relative
    }
    
    .poster::before {
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,rgba(21,21,21,.075) 1px,transparent 1px),
        linear-gradient(180deg,rgba(21,21,21,.06) 1px,transparent 1px);
      background-size:92px 92px;
      opacity:1;
      -webkit-mask-image:linear-gradient(180deg,#000 0%,rgba(0,0,0,.68) 22%,rgba(0,0,0,.18) 42%,transparent 56%);
      mask-image:linear-gradient(180deg,#000 0%,rgba(0,0,0,.68) 22%,rgba(0,0,0,.18) 42%,transparent 56%);
      pointer-events:none
    }

    .content {
      position:relative;
      z-index:1;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:24px
    }
    .kicker {
      width:fit-content;
      max-width:100%;
      font:400 20px/1.1 var(--mono);
      letter-spacing:.03em;
      color:var(--accent);
      text-transform:uppercase;
      padding:8px 11px 7px;
      border-radius:6px;
      background:rgba(21,21,21,.045)
    }
    html[data-palette="lemon-yellow"] .kicker {
      color:var(--accent);
      background:var(--ink)
    }
    .h-xl {
      font-family:var(--display);
      font-size:116px;
      line-height:.95;
      font-weight:400;
      letter-spacing:0;
      margin:18px 0 8px;
      text-wrap:balance
    }
    .h-md {
      font-family:var(--display);
      font-size:66px;
      line-height:1.02;
      font-weight:400;
      letter-spacing:0;
      margin:0 0 18px;
      text-wrap:balance
    }
    .h-xl span,
    .h-md span {
      display:block
    }
    .lead {
      max-width:900px;
      font-size:31px;
      line-height:1.38;
      color:#303030
    }
    .body {
      font-size:27px;
      line-height:1.42
    }
    .grid-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px
    }
    .grid-3 {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px
    }
    .panel {
      border-top:1px solid var(--line);
      border-radius:var(--radius-media);
      background:var(--glass);
      -webkit-backdrop-filter:blur(14px);
      backdrop-filter:blur(14px);
      padding:24px
    }
    .poster[data-page-type="evidence-sample"] .grid-2 > .panel {
      border-radius:0
    }
    .accent {
      color:var(--accent)
    }
    .price {
      position:relative;
      width:fit-content;
      font:400 92px/.78 var(--display);
      color:var(--accent);
      font-variant-numeric:tabular-nums
    }
    .image-well {
      height:560px;
      background:var(--soft);
      border:0;
      border-radius:var(--radius-media);
      display:grid;
      grid-template:1fr / 1fr;
      place-items:center;
      color:var(--muted);
      font-size:28px;
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(21,21,21,.06)
    }
    .image-well.large {
      height:660px
    }
    .image-well img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      min-width:0;
      min-height:0
    }
    .image-caption {
      border:0;
      padding-top:0;
      color:var(--muted);
      font-size:23px;
      line-height:1.35;
      margin-top:-6px
    }
    .image-caption strong {
      display:none
    }
    .ledger {
      display:grid;
      gap:0
    }
    .ledger-row {
      display:grid;
      grid-template-columns:170px 1fr;
      gap:28px;
      border-top:1px solid var(--line);
      padding:20px 0;
      font-size:27px
    }
    .ledger.dense .ledger-row {
      min-height:112px;
      padding:28px 0;
      align-items:center
    }
    .ledger-row strong {
      font:400 19px/1.15 var(--mono);
      color:var(--accent);
      text-transform:uppercase
    }
    .foot {
      margin-top:auto;
      min-height:58px;
      border-top:1px solid var(--line);
      padding-top:18px;
      color:rgba(21,21,21,.58);
      font:400 18px/1 var(--mono);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      z-index:2
    }
    .foot b,.foot .accent {
      color:inherit;
      font:inherit
    }
    .base-layer {
      margin-top:auto !important;
      margin-bottom:0 !important
    }
    .formula-stack {
      margin-top:auto;
      display:grid;
      gap:26px
    }
    .formula-stack .base-layer {
      margin-top:0 !important
    }
    .formula-stack + .foot {
      margin-top:34px
    }
    .base-layer + .foot {
      margin-top:24px
    }
    
    .compare-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px
    }
    .compare-card {
      border:0;
      border-radius:var(--radius-media);
      background:var(--accent);
      color:var(--accent-on);
      padding:28px;
      display:grid;
      gap:16px;
      min-height:340px;
      overflow:hidden
    }
    .compare-card .label,.split-row .label,.formula-step .label {
      font:400 18px/1.1 var(--mono);
      color:var(--accent);
      letter-spacing:.03em;
      text-transform:uppercase
    }
    .compare-card .value {
      font-family:var(--display);
      font-size:64px;
      line-height:1.02;
      font-weight:400
    }
    .compare-card .label,
    .formula-step .label {
      color:var(--accent-on);
      opacity:.72
    }
    .compare-card .note {
      color:var(--accent-on);
      opacity:.82
    }
    .risk,.issue-strip,.risk-strip {
      font-size:23px;
      line-height:1.35;
      color:var(--muted)
    }
    .split-row {
      display:grid;
      grid-template-columns:172px 1fr;
      gap:28px;
      align-items:start;
      border-top:1px solid var(--line);
      padding:21px 0
    }
    .decision-stack {
      display:grid;
      gap:0;
      margin-top:18px
    }
    .decision-stack .split-row {
      min-height:104px;
      padding:26px 0
    }
    .split-row .label {
      align-self:start;
      padding-top:.42em
    }
    .split-row .body {
      margin:0
    }
    .stamp {
      display:inline-flex;
      place-items:center;
      align-items:center;
      justify-content:center;
      width:fit-content;
      max-width:100%;
      min-height:78px;
      border:4px solid var(--accent);
      border-radius:999px;
      color:var(--accent);
      font-size:46px;
      font-weight:760;
      line-height:1;
      padding:16px 34px;
      text-align:center;
      overflow:hidden
    }
    .verdict-pill {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:fit-content;
      max-width:100%;
      min-height:78px;
      border:1px solid var(--accent);
      border-radius:var(--radius-media);
      color:var(--accent-on);
      background:var(--accent);
      font-size:46px;
      font-weight:760;
      line-height:1;
      padding:16px 34px;
      text-align:center;
      overflow:hidden
    }
    .risk-strip,.issue-strip {
      border-top:1px solid var(--line);
      padding:18px;
      display:grid;
      gap:10px;
      overflow:hidden
    }
    .risk {
      position:relative;
      padding-left:18px;
      color:var(--ink)
    }
    .minimal-row {
      color:var(--ink);
      font-size:23px;
      line-height:1.35
    }
    .risk::before,
    .issue-strip > span::before {
      content:"";
      position:absolute;
      left:0;
      top:.675em;
      transform:translateY(-50%);
      width:7px;
      height:7px;
      border-radius:999px;
      background:var(--accent)
    }
    .issue-strip > span {
      position:relative;
      padding-left:18px
    }
    .issue-strip {
      padding-left:18px;
      padding-right:18px;
      background:linear-gradient(90deg,var(--glass-strong),rgba(250,250,250,.2));
      -webkit-backdrop-filter:blur(16px);
      backdrop-filter:blur(16px)
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))),
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) {
      grid-template-columns:repeat(3,1fr);
      gap:0;
      padding:0;
      border:0;
      border-radius:var(--radius-media);
      background:var(--bottom-band);
      color:var(--paper);
      -webkit-backdrop-filter:none;
      backdrop-filter:none;
      box-shadow:none;
      margin-top:28px;
      overflow:hidden;
      position:relative
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::before,
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::after,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::before,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::after {
      content:"";
      position:absolute;
      top:24px;
      bottom:24px;
      width:1px;
      background:rgba(250,250,250,.18);
      pointer-events:none
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::before,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::before {
      left:33.333%
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::after,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4)))::after {
      left:66.666%
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) + .foot,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) + .foot {
      margin-top:34px
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * {
      min-height:132px;
      padding:24px;
      display:grid;
      align-content:space-between;
      gap:14px;
      background:transparent
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > .risk::before,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > span::before {
      display:none
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * + *,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > * + * {
      border-left:0
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > .risk {
      color:var(--paper)
    }
    .risk-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *::before,
    .issue-strip:has(> :nth-child(3)):not(:has(> :nth-child(4))) > *::before {
      display:none
    }
    .risk-strip strong,
    .issue-strip strong {
      display:block;
      font:400 18px/1.15 var(--mono);
      color:var(--accent);
      text-transform:uppercase
    }
    .risk-strip em,
    .issue-strip em {
      display:block;
      color:var(--paper);
      font-style:normal;
      font-size:24px;
      line-height:1.3
    }
    .price-formula {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:24px;
      align-items:stretch
    }
    .formula-step {
      border:0;
      border-radius:var(--radius-media);
      background:var(--accent);
      color:var(--accent-on);
      min-height:210px;
      padding:40px;
      display:grid;
      align-content:start;
      gap:26px;
      position:relative;
      overflow:hidden
    }
    .formula-step .num {
      position:relative;
      padding-left:0;
      font:400 68px/.78 var(--display);
      color:var(--accent-on);
      font-variant-numeric:tabular-nums;
      white-space:nowrap
    }
    .formula-step .num::before {
      display:none
    }
    .formula-arrow {
      display:none;
      place-items:center;
      color:var(--accent);
      font-size:52px
    }
    .bws-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px
    }
    .bws-card {
      border:1px solid rgba(21,21,21,.1);
      border-top:1px solid var(--line-strong);
      border-radius:0;
      padding:22px;
      background:var(--glass);
      -webkit-backdrop-filter:blur(18px);
      backdrop-filter:blur(18px);
      min-height:300px;
      display:grid;
      align-content:start;
      gap:24px;
      overflow:hidden
    }
    .bws-card .tag {
      font-size:19px;
      font-weight:760;
      color:var(--accent)
    }
    .sample-compare {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px
    }
    .sample-pair {
      margin:0;
      border:0;
      border-radius:var(--radius-media);
      background:var(--soft);
      overflow:hidden
    }
    .sample-pair img {
      width:100%;
      height:360px;
      object-fit:cover;
      display:block
    }
    .sample-pair figcaption {
      padding:14px 16px;
      font-size:22px;
      color:var(--muted)
    }
    .zoom-strip {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px
    }
    .zoom-cell {
      border:1px solid rgba(21,21,21,.1);
      border-radius:var(--radius-card);
      background:var(--glass);
      -webkit-backdrop-filter:blur(14px);
      backdrop-filter:blur(14px);
      min-height:112px;
      padding:14px;
      font-size:20px;
      color:var(--muted);
      overflow:hidden
    }
    .stat-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:24px 26px
    }
    .stat-row {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:26px
    }
    .stat {
      min-height:128px;
      display:grid;
      align-content:start;
      gap:12px
    }
    .stat-label {
      font:400 18px/1.15 var(--mono);
      color:var(--muted);
      text-transform:uppercase;
      padding:0;
      margin:0
    }
    .stat-value {
      position:relative;
      padding-left:28px;
      min-height:92px;
      display:flex;
      align-items:flex-end;
      font:400 88px/.76 var(--display);
      color:var(--ink);
      white-space:nowrap;
      font-variant-numeric:tabular-nums
    }
    .stat-value.compact {
      font-size:76px
    }
    .stat:has(.stat-label) .stat-value::after {
      content:"";
      position:absolute;
      left:0;
      bottom:24px;
      width:16px;
      height:48px;
      border-left:1px solid var(--ink);
      border-bottom:1px solid var(--ink);
      opacity:.22
    }
    .case-grid {
      display:grid;
      grid-template-columns:repeat(8,1fr);
      gap:24px
    }
    .case-title {
      grid-column:span 4
    }
    .case-copy {
      grid-column:5 / span 4
    }
    .solid-band {
      margin-top:auto;
      min-height:132px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:0;
      border-radius:var(--radius-media);
      overflow:hidden;
      background:var(--bottom-band);
      color:var(--paper);
      position:relative
    }
    .solid-band > * {
      padding:24px;
      display:grid;
      align-content:space-between;
      gap:14px
    }
    .solid-band::before,
    .solid-band::after {
      content:"";
      position:absolute;
      top:24px;
      bottom:24px;
      width:1px;
      background:rgba(250,250,250,.18);
      pointer-events:none
    }
    .solid-band::before {
      left:33.333%
    }
    .solid-band::after {
      left:66.666%
    }
    .solid-band strong {
      font:400 18px/1.15 var(--mono);
      color:var(--accent);
      text-transform:uppercase
    }
    .solid-band span {
      font-size:28px;
      line-height:1.2
    }
    .solid-band .minimal-row {
      color:var(--paper);
      font-size:24px;
      line-height:1.3
    }
    .poster.final-red {
      background:var(--accent);
      color:var(--accent-on);
      --final-rule:rgba(255,255,255,.36)
    }
    .poster.final-red::before {
      display:none
    }
    .final-red .content {
      justify-content:flex-start;
      z-index:1
    }
    .final-red .kicker {
      color:rgba(255,255,255,.82);
      background:rgba(255,255,255,.1)
    }
    .final-red .h-md,
    .final-red .body {
      color:#fff
    }
    .final-red .verdict-pill {
      background:#fff;
      border-color:#fff;
      color:var(--accent);
      border-radius:var(--radius-media)
    }
    .final-red .bws-card {
      background:transparent;
      border:0;
      border-top:1px solid var(--final-rule);
      -webkit-backdrop-filter:none;
      backdrop-filter:none
    }
    .final-red .bws-card .tag,
    .final-red .ledger-row strong {
      color:rgba(255,255,255,.78)
    }
    .final-red .ledger-row {
      border-top-color:var(--final-rule);
      color:#fff
    }
    .final-red .solid-band {
      background:transparent;
      border:1px solid var(--final-rule);
      color:#fff;
      border-radius:var(--radius-media)
    }
    .final-red .solid-band strong {
      color:#fff
    }
    .final-red .solid-band span,
    .final-red .solid-band .minimal-row {
      color:#fff
    }
    .final-red .solid-band::before,
    .final-red .solid-band::after {
      background:var(--final-rule)
    }
    .final-red .foot {
      color:rgba(255,255,255,.74);
      border-top:1px solid var(--final-rule)
    }
    html[data-palette="lemon-yellow"] .poster.final-red {
      color:var(--ink);
      --final-rule:rgba(21,21,21,.28)
    }
    html[data-palette="lemon-yellow"] .final-red .h-md,
    html[data-palette="lemon-yellow"] .final-red .body {
      color:var(--ink)
    }
    html[data-palette="lemon-yellow"] .final-red .verdict-pill {
      background:var(--ink);
      border-color:var(--ink);
      color:var(--accent)
    }
    html[data-palette="lemon-yellow"] .final-red .bws-card .tag,
    html[data-palette="lemon-yellow"] .final-red .ledger-row strong {
      color:rgba(21,21,21,.72)
    }
    html[data-palette="lemon-yellow"] .final-red .ledger-row {
